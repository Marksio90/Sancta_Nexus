<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#0d0b1a"/>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="80" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="96" cy="96" r="64" fill="none" stroke="#D4AF37" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Chi-Rho / Cross -->
  <line x1="96" y1="30" x2="96" y2="160" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
  <line x1="30" y1="80" x2="162" y2="80" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
  <!-- Nimbus -->
  <circle cx="96" cy="80" r="22" fill="none" stroke="#D4AF37" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Glow dots at cardinal points -->
  <circle cx="96" cy="30" r="3" fill="#D4AF37" fill-opacity="0.6"/>
  <circle cx="96" cy="160" r="3" fill="#D4AF37" fill-opacity="0.6"/>
  <circle cx="30" cy="80" r="3" fill="#D4AF37" fill-opacity="0.6"/>
  <circle cx="162" cy="80" r="3" fill="#D4AF37" fill-opacity="0.6"/>
</svg>
