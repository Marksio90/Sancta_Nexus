# Alembic Configuration for Sancta Nexus
#
# The database URL is overridden at runtime from app.core.config.settings
# so the value below is only a fallback.

[alembic]
script_location = alembic
prepend_sys_path = .

# Template used to generate migration files.
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps (UTC recommended).
timezone = UTC

# Truncate long revision identifiers in filenames.
truncate_slug_length = 40

# Set to true to run the environment during `alembic revision --autogenerate`.
revision_environment = false

# The SQLAlchemy URL — overridden by env.py from Settings.DATABASE_URL,
# but kept here as a placeholder so alembic doesn't complain.
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/sancta_nexus

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
