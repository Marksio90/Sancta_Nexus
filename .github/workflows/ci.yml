name: CI

on:
  push:
    branches:
      - main
      - master
      - "claude/**"
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint deps
        run: pip install --quiet ruff

      - name: Ruff — format check
        run: ruff format --check .

      - name: Ruff — lint
        run: ruff check .

  backend-tests:
    name: Backend — Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test deps
        run: |
          pip install --quiet \
            pytest \
            pytest-asyncio \
            pytest-cov \
            langchain-core \
            pydantic \
            pydantic-settings \
            "python-jose[cryptography]" \
            "passlib[bcrypt]" \
            fastapi

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=0
        env:
          PYTHONPATH: .

      - name: Run safety-critical integration tests
        run: |
          pytest tests/integration/test_safety_critical.py \
            -v \
            --tb=short
        env:
          PYTHONPATH: .

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-checks:
    name: Frontend — Type check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline

      - name: TypeScript — type check
        run: npx tsc --noEmit

      - name: Next.js lint
        run: npm run lint
